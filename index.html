<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="theme-color" content="#0F6E56" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Wiederholung" />
<title>Wiederholung – Spaced Repetition</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-200: #5DCAA5;
    --teal-600: #0F6E56; --teal-800: #085041; --teal-900: #04342C;
    --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-400: #BA7517; --amber-800: #633806;
    --red-50: #FCEBEB; --red-100: #F7C1C1; --red-400: #E24B4A; --red-800: #791F1F;
    --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-400: #7F77DD; --purple-800: #3C3489;
    --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-200: #B4B2A9;
    --gray-400: #888780; --gray-600: #5F5E5A; --gray-800: #444441;

    --bg: #FAFAF8;
    --bg-card: #FFFFFF;
    --bg-surface: #F1EFE8;
    --text-primary: #1A1A18;
    --text-secondary: #5F5E5A;
    --text-hint: #888780;
    --border: rgba(26,26,24,0.12);
    --border-md: rgba(26,26,24,0.22);
    --radius-sm: 8px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 18px;
    --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --bg-card: #1E1E1C;
      --bg-surface: #252523;
      --text-primary: #EEECEA;
      --text-secondary: #8A8880;
      --text-hint: #5F5E5A;
      --border: rgba(255,255,255,0.1);
      --border-md: rgba(255,255,255,0.18);
      --shadow-card: 0 1px 4px rgba(0,0,0,0.3);
      --teal-50: #04342C; --teal-100: #085041; --teal-600: #5DCAA5; --teal-800: #9FE1CB;
      --amber-50: #412402; --amber-100: #633806; --amber-400: #EF9F27; --amber-800: #FAC775;
      --red-50: #501313; --red-100: #791F1F; --red-400: #F09595; --red-800: #F7C1C1;
      --purple-50: #26215C; --purple-100: #3C3489; --purple-400: #AFA9EC; --purple-800: #CECBF6;
    }
  }

  html, body { height: 100%; background: var(--bg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column; align-items: center;
  }

  .app {
    width: 100%; max-width: 480px;
    min-height: 100%; display: flex; flex-direction: column;
    position: relative;
  }

  /* ── Header ── */
  .header {
    padding: 56px 20px 12px;
    background: var(--bg);
    position: sticky; top: 0; z-index: 20;
    border-bottom: 0.5px solid var(--border);
  }
  .header-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
  .header-title { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; color: var(--text-primary); }
  .header-date { font-size: 13px; color: var(--text-secondary); }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .stat-card {
    background: var(--bg-surface);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    text-align: center;
  }
  .stat-num { font-size: 20px; font-weight: 600; color: var(--text-primary); line-height: 1; }
  .stat-num.urgent { color: var(--red-400); }
  .stat-num.green { color: var(--teal-600); }
  .stat-label { font-size: 11px; color: var(--text-hint); margin-top: 3px; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 0; }
  .tab {
    flex: 1; padding: 8px 4px; font-size: 13px; font-weight: 400;
    color: var(--text-secondary); background: none; border: none;
    border-bottom: 2px solid transparent; cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    font-family: inherit;
  }
  .tab.active { color: var(--teal-600); border-bottom-color: var(--teal-600); font-weight: 600; }

  /* ── Content ── */
  .content {
    flex: 1; padding: 16px 16px 120px;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }

  /* ── Section label ── */
  .section-label {
    font-size: 11px; font-weight: 600; color: var(--text-hint);
    text-transform: uppercase; letter-spacing: 0.07em;
    margin: 18px 0 8px;
  }
  .section-label:first-child { margin-top: 0; }

  /* ── Topic card ── */
  .topic-card {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 8px;
    box-shadow: var(--shadow-card);
    transition: transform 0.1s;
  }
  .topic-card.fading { animation: fadeSlide 0.3s ease forwards; }
  @keyframes fadeSlide {
    to { opacity: 0; transform: translateX(30px); }
  }

  .topic-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 7px; }
  .topic-name { font-size: 15px; font-weight: 500; color: var(--text-primary); flex: 1; line-height: 1.3; }

  .phase-badge {
    font-size: 11px; font-weight: 500;
    padding: 3px 9px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
  }
  .ph-1 { background: var(--red-50); color: var(--red-800); }
  .ph-2 { background: var(--amber-50); color: var(--amber-800); }
  .ph-3 { background: var(--teal-50); color: var(--teal-800); }
  .ph-m { background: var(--purple-50); color: var(--purple-800); }

  .topic-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; flex-wrap: wrap; }
  .mod-tag {
    font-size: 11px; font-weight: 500; color: var(--text-secondary);
    background: var(--bg-surface); padding: 3px 8px; border-radius: 20px;
  }
  .due-text {
    font-size: 12px; color: var(--text-hint);
    cursor: pointer; position: relative; display: inline-block;
    border-bottom: 1px dashed var(--border-md);
  }
  .due-text.now { color: var(--red-400); font-weight: 500; border-bottom-color: var(--red-100); }
  .due-text.mastered-txt { border-bottom: none; cursor: default; }

  /* Tooltip */
  .due-tooltip {
    position: fixed; z-index: 200;
    background: var(--text-primary); color: var(--bg);
    font-size: 12px; font-weight: 500;
    padding: 6px 12px; border-radius: var(--radius-sm);
    pointer-events: none; white-space: nowrap;
    opacity: 0; transition: opacity 0.15s;
  }
  .due-tooltip.show { opacity: 1; }

  .interval-track { display: flex; gap: 4px; margin-bottom: 12px; }
  .iv-dot { height: 4px; flex: 1; border-radius: 2px; background: var(--border); }
  .iv-dot.done { background: var(--teal-600); }
  .iv-dot.current { background: var(--amber-400); }

  .notes-text { font-size: 12px; color: var(--text-hint); margin-bottom: 10px; line-height: 1.5; font-style: italic; }

  .actions { display: flex; gap: 6px; }
  .act-btn {
    flex: 1; padding: 8px 4px; border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 500; border: 0.5px solid var(--border);
    cursor: pointer; text-align: center; font-family: inherit;
    transition: opacity 0.12s, transform 0.12s;
  }
  .act-btn:active { opacity: 0.7; transform: scale(0.97); }
  .btn-ok  { background: var(--teal-50);   color: var(--teal-800);   border-color: var(--teal-100); }
  .btn-lt  { background: var(--amber-50);  color: var(--amber-800);  border-color: var(--amber-100); }
  .btn-no  { background: var(--red-50);    color: var(--red-800);    border-color: var(--red-100); }

  /* ── Module cards ── */
  .module-card {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    box-shadow: var(--shadow-card);
    transition: border-color 0.15s;
  }
  .module-card:active { border-color: var(--border-md); }
  .mod-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .mod-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
  .mod-count { font-size: 12px; color: var(--text-hint); }
  .prog-track { height: 5px; background: var(--bg-surface); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
  .prog-fill { height: 100%; border-radius: 3px; background: var(--teal-600); transition: width 0.4s ease; }
  .mod-stats { display: flex; gap: 14px; }
  .mod-stat { font-size: 11px; color: var(--text-hint); }
  .mod-stat b { color: var(--text-primary); font-weight: 600; }
  .mod-stat b.red { color: var(--red-400); }
  .mod-stat b.teal { color: var(--teal-600); }

  /* ── Filter chips ── */
  .filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 10px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .chip {
    padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 500;
    border: 0.5px solid var(--border-md); background: transparent;
    color: var(--text-secondary); cursor: pointer; white-space: nowrap; font-family: inherit;
    transition: all 0.12s;
  }
  .chip.active { background: var(--teal-50); color: var(--teal-800); border-color: var(--teal-100); }

  /* ── Form ── */
  .form-section { margin-bottom: 18px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; display: block; letter-spacing: 0.03em; }
  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 12px 14px;
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    font-size: 15px; background: var(--bg-card);
    color: var(--text-primary); font-family: inherit;
    -webkit-appearance: none; appearance: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none; border-color: var(--teal-600);
    box-shadow: 0 0 0 3px rgba(15,110,86,0.1);
  }
  .form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

  .cycle-info {
    background: var(--teal-50); border-radius: var(--radius-md);
    padding: 12px 14px; margin-bottom: 20px;
  }
  .cycle-title { font-size: 12px; font-weight: 600; color: var(--teal-800); margin-bottom: 4px; }
  .cycle-steps { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .cycle-step { font-size: 11px; color: var(--teal-600); }
  .cycle-arrow { font-size: 10px; color: var(--teal-100); }

  .btn-primary {
    width: 100%; padding: 14px;
    background: var(--teal-600); color: #fff;
    border: none; border-radius: var(--radius-md);
    font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: inherit; letter-spacing: 0.01em;
    transition: opacity 0.15s;
  }
  .btn-primary:active { opacity: 0.85; }

  /* ── Empty ── */
  .empty {
    text-align: center; padding: 48px 20px;
    color: var(--text-hint); font-size: 13px; line-height: 1.6;
  }
  .empty-emoji { font-size: 36px; display: block; margin-bottom: 12px; }

  /* ── Navbar ── */
  .navbar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    display: flex;
    background: var(--bg-card);
    border-top: 0.5px solid var(--border);
    z-index: 30;
    padding-bottom: max(env(safe-area-inset-bottom, 0px), 8px);
  }
  .nav-btn {
    flex: 1; padding: 12px 4px 14px;
    font-size: 10px; font-weight: 500;
    color: var(--text-hint); background: none; border: none;
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; gap: 3px; font-family: inherit;
    transition: color 0.12s;
  }
  .nav-btn.active { color: var(--teal-600); }
  .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.6; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--text-primary); color: var(--bg);
    padding: 10px 20px; border-radius: 24px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity 0.25s, transform 0.25s;
    pointer-events: none; white-space: nowrap;
    z-index: 100; transform: translateX(-50%) translateY(8px);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Confirm modal ── */
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 50;
    align-items: flex-end; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--bg-card); border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0));
    width: 100%; max-width: 480px; animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }
  .modal-actions { display: flex; flex-direction: column; gap: 8px; }
  .modal-btn {
    width: 100%; padding: 13px; border-radius: var(--radius-md);
    font-size: 14px; font-weight: 500; border: none; cursor: pointer;
    font-family: inherit; text-align: left; transition: opacity 0.12s;
  }
  .modal-btn:active { opacity: 0.8; }
  .modal-btn-ok   { background: var(--teal-50); color: var(--teal-800); }
  .modal-btn-lt   { background: var(--amber-50); color: var(--amber-800); }
  .modal-btn-no   { background: var(--red-50); color: var(--red-800); }
  .modal-btn-cancel { background: var(--bg-surface); color: var(--text-secondary); margin-top: 4px; }
  .modal-btn .sub { font-size: 11px; opacity: 0.7; display: block; margin-top: 1px; }

  /* ── Responsive ── */
  /* ── Card menu button ── */
  .card-menu-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-hint); padding: 2px 4px; border-radius: 6px;
    font-size: 18px; line-height: 1; flex-shrink: 0;
    transition: background 0.12s, color 0.12s;
  }
  .card-menu-btn:active { background: var(--bg-surface); color: var(--text-primary); }

  /* ── Context menu (edit/delete) ── */
  .ctx-menu {
    position: fixed; z-index: 60;
    background: var(--bg-card);
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    overflow: hidden; min-width: 160px;
  }
  .ctx-item {
    display: block; width: 100%; padding: 12px 16px;
    font-size: 14px; font-weight: 500; text-align: left;
    background: none; border: none; cursor: pointer;
    font-family: inherit; color: var(--text-primary);
    transition: background 0.1s;
  }
  .ctx-item:active { background: var(--bg-surface); }
  .ctx-item.danger { color: var(--red-400); }
  .ctx-item + .ctx-item { border-top: 0.5px solid var(--border); }

  /* ── Edit modal ── */
  .edit-modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 50;
    align-items: flex-end; justify-content: center;
  }
  .edit-modal-backdrop.open { display: flex; }
  .edit-modal {
    background: var(--bg-card);
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0));
    width: 100%; max-width: 480px; animation: slideUp 0.25s ease;
  }
  .edit-modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

  /* ── Module detail sheet ── */
  .mod-sheet-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 50;
    align-items: flex-end; justify-content: center;
  }
  .mod-sheet-backdrop.open { display: flex; }
  .mod-sheet {
    background: var(--bg-card);
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    padding: 20px 20px calc(24px + env(safe-area-inset-bottom, 0));
    width: 100%; max-width: 480px;
    animation: slideUp 0.25s ease;
    max-height: 88vh; overflow-y: auto;
  }
  .mod-sheet-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .mod-sheet-title { font-size: 18px; font-weight: 700; color: var(--text-primary); }
  .mod-sheet-close {
    background: var(--bg-surface); border: none; border-radius: 50%;
    width: 28px; height: 28px; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); flex-shrink: 0;
  }
  .donut-wrap { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
  .donut-svg { flex-shrink: 0; }
  .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { color: var(--text-secondary); flex: 1; }
  .legend-val { font-weight: 600; color: var(--text-primary); }
  .mod-sheet-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .mod-sheet-btn {
    width: 100%; padding: 12px; border-radius: var(--radius-md);
    background: var(--teal-50); color: var(--teal-800);
    border: none; font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity 0.12s;
  }
  .mod-sheet-btn:active { opacity: 0.8; }

  @media (min-width: 480px) {
    .app { border-left: 0.5px solid var(--border); border-right: 0.5px solid var(--border); }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-row">
      <div class="header-title" id="header-title">Heute</div>
      <div class="header-date" id="header-date"></div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num urgent" id="s-due">0</div><div class="stat-label">Fällig</div></div>
      <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-label">Themen</div></div>
      <div class="stat-card"><div class="stat-num green" id="s-mastered">0</div><div class="stat-label">Gemeistert</div></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('today')">Heute</button>
      <button class="tab" onclick="showTab('topics')">Alle</button>
      <button class="tab" onclick="showTab('modules')">Module</button>
      <button class="tab" onclick="showTab('new')">+ Neu</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="content"></div>

  <!-- Navbar -->
  <div class="navbar">
    <button class="nav-btn active" id="nav-today" onclick="showTab('today')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Heute
    </button>
    <button class="nav-btn" id="nav-topics" onclick="showTab('topics')">
      <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      Alle
    </button>
    <button class="nav-btn" id="nav-modules" onclick="showTab('modules')">
      <svg viewBox="0 0 24 24"><path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/></svg>
      Module
    </button>
    <button class="nav-btn" id="nav-new" onclick="showTab('new')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
      Neu
    </button>
  </div>
</div>

<!-- Action Modal -->
<div class="modal-backdrop" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-ok" id="modal-ok" onclick="doAction('ok')">
        ✓ Fertig – Thema wiederholt
        <span class="sub" id="modal-ok-sub"></span>
      </button>
      <button class="modal-btn modal-btn-lt" onclick="doAction('later')">
        ⏱ Später – heute nochmal erinnern
        <span class="sub">In 2 Stunden erneut fällig</span>
      </button>
      <button class="modal-btn modal-btn-no" onclick="doAction('fail')">
        ✗ Nicht geschafft – zurücksetzen
        <span class="sub">Zurück auf Stufe 1 (1 Stunde)</span>
      </button>
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Abbrechen</button>
    </div>
  </div>
</div>

<!-- Module Detail Sheet -->
<div class="mod-sheet-backdrop" id="mod-sheet" onclick="closeModSheet(event)">
  <div class="mod-sheet">
    <div class="mod-sheet-header">
      <div class="mod-sheet-title" id="mod-sheet-title"></div>

    <div class="donut-wrap">
      <svg class="donut-svg" id="mod-donut" width="130" height="130" viewBox="0 0 130 130"></svg>
      <div class="donut-legend" id="mod-legend"></div>
    </div>
    <div class="mod-sheet-stats" id="mod-sheet-stats"></div>

  </div>
</div>

<!-- Edit Modal -->
<div class="edit-modal-backdrop" id="edit-modal" onclick="closeEditModal(event)">
  <div class="edit-modal">
    <div class="edit-modal-title">Thema bearbeiten</div>
    <div class="form-section">
      <label class="form-label">Thema</label>
      <input class="form-input" id="edit-name" type="text" autocomplete="off" />
    </div>
    <div class="form-section">
      <label class="form-label">Modul</label>
      <input class="form-input" id="edit-module" type="text" list="edit-mod-opts" autocomplete="off" />

    </div>
    <button class="btn-primary" onclick="saveEdit()">Änderungen speichern</button>
    <button class="modal-btn modal-btn-cancel" style="width:100%;margin-top:8px;padding:12px;border-radius:var(--radius-md);background:var(--bg-surface);color:var(--text-secondary);border:none;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer" onclick="closeEditModal()">Abbrechen</button>
  </div>

<div id="ctx-menu" class="ctx-menu" style="display:none">
  <button class="ctx-item" onclick="openEditModal()">✏️ Bearbeiten</button>
  <button class="ctx-item danger" onclick="deleteTopic()">🗑 Löschen</button>
</div>

<!-- Tooltip -->
<div class="due-tooltip" id="due-tooltip"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
// Data
// ─────────────────────────────────────────────
const INTERVALS = [
  { label: '1 Stunde',   short: '1h',  ms: 3_600_000 },
  { label: '1 Tag',      short: '1T',  ms: 86_400_000 },
  { label: '3 Tage',     short: '3T',  ms: 259_200_000 },
  { label: '1 Woche',    short: '1W',  ms: 604_800_000 },
  { label: '1 Monat',    short: '1M',  ms: 2_592_000_000 },
  { label: '3 Monate',   short: '3M',  ms: 7_776_000_000 },
];

const SAMPLE = [
  { id:'s1', name:'Radikale und Radikalreaktionen', module:'OC2b',        notes:'', createdAt:Date.now(), intervalIndex:0, nextDue:Date.now()+36e5, lastReviewed:null, status:'active' },
  { id:'s2', name:'Molekulare Maschinen',           module:'Biochemie 3', notes:'', createdAt:Date.now(), intervalIndex:0, nextDue:Date.now()+36e5, lastReviewed:null, status:'active' },
];

let topics = [];
let activeTab = 'today';
let filterModule = 'all';
let modalTopicId = null;

// ── Storage: IndexedDB with localStorage fallback ──
const DB_NAME = 'wh_db', DB_STORE = 'kv', DB_KEY = 'topics_v3';
let _db = null;

function openDB() {
  return new Promise((res, rej) => {
    if (_db) return res(_db);
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror = () => rej(req.error);
  });
}
function dbGet(key) {
  return openDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  }));
}
function dbSet(key, val) {
  return openDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    const req = tx.objectStore(DB_STORE).put(val, key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  }));
}

async function load() {
  try {
    let data = await dbGet(DB_KEY);
    // fallback: try old localStorage key
    if (!data) {
      const ls = localStorage.getItem('wh_topics_v2');
      if (ls) { data = JSON.parse(ls); await dbSet(DB_KEY, data); localStorage.removeItem('wh_topics_v2'); }
    }
    topics = data ? data : JSON.parse(JSON.stringify(SAMPLE));
  } catch(e) {
    try { const ls = localStorage.getItem('wh_topics_v2'); topics = ls ? JSON.parse(ls) : JSON.parse(JSON.stringify(SAMPLE)); }
    catch(e2) { topics = JSON.parse(JSON.stringify(SAMPLE)); }
  }
}
async function save() {
  try { await dbSet(DB_KEY, topics); }
  catch(e) { try { localStorage.setItem('wh_topics_v2', JSON.stringify(topics)); } catch(e2) {} }
}

function exportData() {
  const blob = new Blob([JSON.stringify(topics, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wiederholung-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  toast('Backup gespeichert ✓');
}
function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = async e => {
    const file = e.target.files[0]; if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!Array.isArray(data)) throw new Error('Ungültiges Format');
      topics = data; await save(); render(); updateStats();
      toast('Backup geladen ✓ – ' + data.length + ' Themen');
    } catch(err) { toast('Fehler beim Laden der Datei'); }
  };
  input.click();
}

// ─────────────────────────────────────────────
// Logic
// ─────────────────────────────────────────────

// Midnight of today (start of tomorrow)
function todayEnd() {
  const d = new Date(); d.setHours(23,59,59,999); return d.getTime();
}
// Midnight tonight = start of tomorrow
function tomorrowStart() {
  const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()+1); return d.getTime();
}

// "Due" = overdue right now (can act on immediately)
function isDue(t) { return t.status !== 'mastered' && t.nextDue <= Date.now(); }
// "Due today" = fällig irgendwann heute (auch wenn noch nicht die Stunde erreicht)
function isDueToday(t) { return t.status !== 'mastered' && t.nextDue <= todayEnd(); }

// Smart next-due: snaps to meaningful day boundaries
// For intervals >= 1 day: always set to 08:00 of the correct future day
// so that "1 Tag" means "morgen früh", not "in 24h um 23:00"
function calcNextDue(intervalIndex) {
  const iv = INTERVALS[intervalIndex];
  const now = Date.now();
  if (intervalIndex === 0) {
    // 1h: pure countdown, keep as-is
    return now + iv.ms;
  }
  // For day-based intervals: snap to 08:00 of the target day
  // but with a reduced cooldown: target day = ceil((ms * 0.75) / day) days from now
  // This lets you confirm a bit earlier without pushing back the schedule
  const targetMs = iv.ms * 0.75; // 75% cooldown: e.g. "1 Tag" becomes confirmable after ~18h
  const targetDate = new Date(now + targetMs);
  targetDate.setHours(8, 0, 0, 0); // snap to 08:00
  // If 08:00 of that day is in the past (confirmed very late), push to next day 08:00
  if (targetDate.getTime() <= now) targetDate.setDate(targetDate.getDate() + 1);
  return targetDate.getTime();
}

function getPhase(t) {
  if (t.status === 'mastered') return { label: 'Gemeistert', cls: 'ph-m' };
  const i = t.intervalIndex;
  if (i <= 1) return { label: INTERVALS[i].label, cls: 'ph-1' };
  if (i <= 2) return { label: INTERVALS[i].label, cls: 'ph-2' };
  return { label: INTERVALS[i].label, cls: 'ph-3' };
}

function nextLabel(t) {
  if (t.intervalIndex >= 5) return 'Gemeistert';
  return 'Nächste WH: ' + INTERVALS[t.intervalIndex + 1].label;
}

function relTime(ms) {
  const d = ms - Date.now();
  if (d <= 0) return 'jetzt fällig';
  const h = Math.floor(d / 3_600_000);
  if (h < 1) return 'in ' + Math.floor(d / 60000) + ' Min';
  if (h < 24) return 'in ' + h + 'h';
  const days = Math.floor(h / 24);
  if (days < 30) return 'in ' + days + ' Tag' + (days > 1 ? 'en' : '');
  return 'in ' + Math.floor(days / 30) + ' Monat' + (Math.floor(days/30) > 1 ? 'en' : '');
}

function formatExact(ms) {
  const d = new Date(ms);
  const weekdays = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  const day = weekdays[d.getDay()];
  const date = d.toLocaleDateString('de-DE', { day: 'numeric', month: 'numeric', year: '2-digit' });
  const time = d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  return day + ', ' + date + ' · ' + time + ' Uhr';
}

let tooltipTimer = null;
function showDueTooltip(e, ms) {
  const tip = document.getElementById('due-tooltip');
  tip.textContent = formatExact(ms);
  tip.classList.add('show');
  positionTooltip(e, tip);
}
function positionTooltip(e, tip) {
  const x = e.clientX, y = e.clientY;
  const tw = tip.offsetWidth || 160;
  let left = x - tw / 2;
  if (left < 8) left = 8;
  if (left + tw > window.innerWidth - 8) left = window.innerWidth - tw - 8;
  tip.style.left = left + 'px';
  tip.style.top = (y - 38) + 'px';
}
function hideDueTooltip() {
  document.getElementById('due-tooltip').classList.remove('show');
}

function doAction(action) {
  const t = topics.find(x => x.id === modalTopicId);
  if (!t) { closeModal(); return; }
  closeModal();

  if (action === 'ok') {
    t.lastReviewed = Date.now();
    if (t.intervalIndex < 5) {
      t.intervalIndex += 1;
      t.nextDue = calcNextDue(t.intervalIndex);
      if (t.intervalIndex === 5) {
        t.status = 'mastered';
        toast('🎉 Gemeistert! Perfekt gelernt.');
      } else {
        toast('✓ Super! ' + nextLabel(t));
      }
    } else {
      t.status = 'mastered';
      toast('🎉 Gemeistert!');
    }
  } else if (action === 'later') {
    t.nextDue = Date.now() + 7_200_000;
    toast('⏱ Kommt in 2 Stunden nochmal.');
  } else if (action === 'fail') {
    t.intervalIndex = 0;
    t.nextDue = calcNextDue(0);
    t.lastReviewed = Date.now();
    toast('Zurück auf Stufe 1 – nächste WH in 1h');
  }
  save();
  setTimeout(render, 320);
}

function openModal(id) {
  modalTopicId = id;
  const t = topics.find(x => x.id === id);
  if (!t) return;
  document.getElementById('modal-title').textContent = t.name;
  document.getElementById('modal-sub').textContent = t.module + ' · Stufe ' + (t.intervalIndex + 1) + ' von 6';
  const nxt = t.intervalIndex < 5 ? INTERVALS[t.intervalIndex + 1].label : 'Gemeistert';
  document.getElementById('modal-ok-sub').textContent = 'Nächste Wiederholung: ' + nxt;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  modalTopicId = null;
}

// ── Context menu ──
let ctxTopicId = null;

function openCtxMenu(e, id) {
  e.stopPropagation();
  ctxTopicId = id;
  const menu = document.getElementById('ctx-menu');
  menu.style.display = 'block';
  // Position near the button
  const btn = e.currentTarget;
  const rect = btn.getBoundingClientRect();
  const menuW = 170;
  let left = rect.right - menuW;
  let top = rect.bottom + 4;
  if (left < 8) left = 8;
  if (top + 100 > window.innerHeight) top = rect.top - 108;
  menu.style.left = left + 'px';
  menu.style.top = top + 'px';
  setTimeout(() => document.addEventListener('click', closeCtxMenu, { once: true }), 10);
}

function closeCtxMenu() {
  document.getElementById('ctx-menu').style.display = 'none';
}

function deleteTopic() {
  closeCtxMenu();
  if (!ctxTopicId) return;
  const t = topics.find(x => x.id === ctxTopicId);
  if (!t) return;
  if (!confirm('„' + t.name + '" wirklich löschen?')) return;
  topics = topics.filter(x => x.id !== ctxTopicId);
  ctxTopicId = null;
  save(); render(); updateStats();
  toast('Thema gelöscht');
}

// ── Edit modal ──
let editTopicId = null;

function openEditModal() {
  closeCtxMenu();
  editTopicId = ctxTopicId;
  const t = topics.find(x => x.id === editTopicId);
  if (!t) return;
  document.getElementById('edit-name').value = t.name;
  document.getElementById('edit-module').value = t.module;
  document.getElementById('edit-notes').value = t.notes || '';
  // Populate module datalist
  const mods = [...new Set(topics.map(x => x.module))];
  document.getElementById('edit-mod-opts').innerHTML = mods.map(m => '<option>' + esc(m) + '</option>').join('');
  document.getElementById('edit-modal').classList.add('open');
}

function closeEditModal(e) {
  if (e && e.target !== document.getElementById('edit-modal')) return;
  document.getElementById('edit-modal').classList.remove('open');
  editTopicId = null;
}

async function saveEdit() {
  const name = (document.getElementById('edit-name').value || '').trim();
  const module = (document.getElementById('edit-module').value || '').trim();
  const notes = (document.getElementById('edit-notes').value || '').trim();
  if (!name || !module) { toast('Name und Modul erforderlich'); return; }
  const t = topics.find(x => x.id === editTopicId);
  if (!t) return;
  t.name = name; t.module = module; t.notes = notes;
  await save(); render(); updateStats();
  document.getElementById('edit-modal').classList.remove('open');
  editTopicId = null;
  toast('Gespeichert ✓');
}

// ─────────────────────────────────────────────
// Module detail sheet
// ─────────────────────────────────────────────
const STAGE_COLORS = ['#B4B2A9','#F09595','#FAC775','#EF9F27','#5DCAA5','#1D9E75','#085041'];
const STAGE_LABELS = ['Neu','1 Stunde','1 Tag','3 Tage','1 Woche','1 Monat','3 Monate / Gemeistert'];

function openModSheet(m) {
  const ts = topics.filter(t => t.module === m);
  document.getElementById('mod-sheet-title').textContent = m;

  // Count topics per stage (0=new/stage0 … 5=stage5, 6=mastered)
  const counts = Array(7).fill(0);
  ts.forEach(t => {
    const s = t.status === 'mastered' ? 6 : t.intervalIndex;
    counts[s]++;
  });
  const total = ts.length || 1;

  // Draw donut SVG
  const cx = 65, cy = 65, r = 48, stroke = 22;
  const circumference = 2 * Math.PI * r;
  let offset = 0;
  // Start from top (rotate -90deg)
  const segments = [];
  counts.forEach((count, i) => {
    if (count === 0) return;
    const pct = count / total;
    const dash = pct * circumference;
    segments.push({ i, count, dash, offset: offset * circumference });
    offset += pct;
  });

  let svgHTML = '';
  // Background circle
  svgHTML += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--bg-surface)" stroke-width="${stroke}"/>`;
  segments.forEach(seg => {
    svgHTML += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
      stroke="${STAGE_COLORS[seg.i]}" stroke-width="${stroke}"
      stroke-dasharray="${seg.dash.toFixed(2)} ${(circumference - seg.dash).toFixed(2)}"
      stroke-dashoffset="${(-seg.offset + circumference / 4).toFixed(2)}"
      style="transition:stroke-dasharray 0.4s ease"/>`;
  });

  // Center text
  const mastered = ts.filter(t => t.status === 'mastered').length;
  const pct = Math.round((ts.reduce((s,t) => s + (t.status==='mastered'?6:t.intervalIndex), 0)) / (total*6) * 100);
  svgHTML += `<text x="${cx}" y="${cy - 6}" text-anchor="middle" font-size="20" font-weight="700" fill="var(--text-primary)">${pct}%</text>`;
  svgHTML += `<text x="${cx}" y="${cy + 12}" text-anchor="middle" font-size="10" fill="var(--text-hint)">Fortschritt</text>`;

  document.getElementById('mod-donut').innerHTML = svgHTML;

  // Legend (only non-zero stages)
  let legendHTML = '';
  counts.forEach((count, i) => {
    if (count === 0) return;
    legendHTML += `<div class="legend-row">
      <div class="legend-dot" style="background:${STAGE_COLORS[i]}"></div>
      <div class="legend-label">${STAGE_LABELS[i]}</div>
      <div class="legend-val">${count}</div>
    </div>`;
  });
  document.getElementById('mod-legend').innerHTML = legendHTML;

  // Stats row
  const due = ts.filter(isDue).length;
  const dueToday = ts.filter(isDueToday).length;
  document.getElementById('mod-sheet-stats').innerHTML = `
    <div class="stat-card"><div class="stat-num">${ts.length}</div><div class="stat-label">Themen</div></div>
    <div class="stat-card"><div class="stat-num ${due>0?'urgent':''}">${due}</div><div class="stat-label">Jetzt fällig</div></div>
    <div class="stat-card"><div class="stat-num green">${mastered}</div><div class="stat-label">Gemeistert</div></div>`;

  // Button
  document.getElementById('mod-sheet-goto').onclick = () => {
    closeModSheet(); setFilter(m); showTab('topics');
  };

  document.getElementById('mod-sheet').classList.add('open');
}

function closeModSheet(e) {
  if (e && e.target !== document.getElementById('mod-sheet')) return;
  document.getElementById('mod-sheet').classList.remove('open');
}

// ─────────────────────────────────────────────
// Render helpers
// ─────────────────────────────────────────────
function dotsHTML(t) {
  return INTERVALS.map((_, i) => {
    let cls = 'iv-dot';
    if (i < t.intervalIndex) cls += ' done';
    else if (i === t.intervalIndex && t.status !== 'mastered') cls += ' current';
    return '<div class="' + cls + '"></div>';
  }).join('');
}

function topicCardHTML(t, showActions) {
  const ph = getPhase(t);
  const due = isDue(t);
  const notesHTML = t.notes ? '<div class="notes-text">' + esc(t.notes) + '</div>' : '';
  const dueClass = due ? 'now' : '';
  const dueStr = t.status === 'mastered' ? 'Gemeistert ✓' : relTime(t.nextDue);
  const dueTapAttr = t.status !== 'mastered'
    ? `onclick="showDueTooltip(event,${t.nextDue});setTimeout(hideDueTooltip,2800)" onmouseover="showDueTooltip(event,${t.nextDue})" onmouseout="hideDueTooltip()"`
    : '';
  const dueCls = t.status === 'mastered' ? 'mastered-txt' : dueClass;
  const actHTML = showActions
    ? `<button class="act-btn btn-ok" onclick="openModal('${t.id}')">✓ Fertig</button>
       <button class="act-btn btn-lt" onclick="openModal('${t.id}')">⏱ Später</button>
       <button class="act-btn btn-no" onclick="openModal('${t.id}')">✗ Nein</button>`
    : '';

  return `<div class="topic-card" id="card-${t.id}">
  <div class="topic-top">
    <div class="topic-name">${esc(t.name)}</div>
    <span class="phase-badge ${ph.cls}">${ph.label}</span>
    <button class="card-menu-btn" onclick="openCtxMenu(event,'${t.id}')">⋯</button>
  </div>
  <div class="topic-meta">
    <span class="mod-tag">${esc(t.module)}</span>
    <span class="due-text ${dueCls}" ${dueTapAttr}>${dueStr}</span>
  </div>
  <div class="interval-track">${dotsHTML(t)}</div>
  ${notesHTML}
  ${showActions ? '<div class="actions">' + actHTML + '</div>' : ''}
</div>`;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
// Tabs
// ─────────────────────────────────────────────
function renderToday() {
  // Split into three groups:
  const now = topics.filter(isDue).sort((a,b) => a.nextDue - b.nextDue);
  const laterToday = topics
    .filter(t => !isDue(t) && isDueToday(t) && t.status !== 'mastered')
    .sort((a,b) => a.nextDue - b.nextDue);
  const upcoming = topics
    .filter(t => !isDueToday(t) && t.status !== 'mastered')
    .sort((a,b) => a.nextDue - b.nextDue)
    .slice(0, 4);

  let html = '';

  if (now.length === 0 && laterToday.length === 0) {
    html += `<div class="empty">
      <span class="empty-emoji">🎉</span>
      Heute alles erledigt!<br>
      <span style="font-size:12px;margin-top:6px;display:block;color:var(--text-hint)">
        Neue Themen anlegen oder morgen wiederkommen.
      </span>
    </div>`;
  }

  if (now.length > 0) {
    html += '<div class="section-label">Jetzt fällig (' + now.length + ')</div>';
    now.forEach(t => html += topicCardHTML(t, true));
  }

  if (laterToday.length > 0) {
    html += '<div class="section-label">Heute noch fällig (' + laterToday.length + ')</div>';
    laterToday.forEach(t => html += topicCardHTML(t, false));
  }

  if (upcoming.length > 0) {
    html += '<div class="section-label" style="margin-top:24px;padding-top:16px;border-top:0.5px solid var(--border)">Demnächst</div>';
    upcoming.forEach(t => html += topicCardHTML(t, false));
  }

  document.getElementById('content').innerHTML = html;
}

function renderTopics() {
  const allMods = ['all', ...new Set(topics.map(t => t.module))];
  let html = '<div class="filter-row">';
  allMods.forEach(m => {
    const lbl = m === 'all' ? 'Alle' : m;
    html += `<button class="chip ${filterModule===m?'active':''}" onclick="setFilter('${m}')">${lbl}</button>`;
  });
  html += '</div>';

  let filtered = filterModule === 'all' ? [...topics] : topics.filter(t => t.module === filterModule);
  // Sort: due first, then by nextDue
  filtered.sort((a, b) => {
    const ad = isDue(a), bd = isDue(b);
    if (ad && !bd) return -1;
    if (!ad && bd) return 1;
    return a.nextDue - b.nextDue;
  });

  if (filtered.length === 0) html += '<div class="empty"><span class="empty-emoji">📭</span>Keine Themen in diesem Modul.</div>';
  filtered.forEach(t => html += topicCardHTML(t, isDue(t)));
  document.getElementById('content').innerHTML = html;
}

function setFilter(m) { filterModule = m; renderTopics(); }

function renderModules() {
  const mods = [...new Set(topics.map(t => t.module))].sort();
  if (mods.length === 0) {
    document.getElementById('content').innerHTML = '<div class="empty"><span class="empty-emoji">📦</span>Noch keine Module angelegt.</div>';
    return;
  }
  let html = '';
  mods.forEach(m => {
    const ts = topics.filter(t => t.module === m);
    const mastered = ts.filter(t => t.status === 'mastered').length;
    const due = ts.filter(isDue).length;
    // Progress = average stage across all topics (each topic has 0–6 steps)
    const totalSteps = ts.reduce((sum, t) => sum + (t.status === 'mastered' ? 6 : t.intervalIndex), 0);
    const pct = ts.length > 0 ? Math.round((totalSteps / (ts.length * 6)) * 100) : 0;
    html += `<div class="module-card" onclick="openModSheet('${m}')">
  <div class="mod-header">
    <div class="mod-name">${esc(m)}</div>
    <div class="mod-count">${ts.length} Themen</div>
  </div>
  <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
  <div class="mod-stats">
    <div class="mod-stat"><b class="teal">${pct}%</b> Fortschritt</div>
    <div class="mod-stat"><b class="${due>0?'red':''}">${due}</b> fällig</div>
    <div class="mod-stat"><b>${mastered}</b> gemeistert</div>
  </div>
</div>`;
  });
  html += `<div style="margin-top:20px;border-top:0.5px solid var(--border);padding-top:16px">
  <div style="font-size:11px;font-weight:600;color:var(--text-hint);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">Datensicherung</div>
  <div style="display:flex;gap:8px">
    <button onclick="exportData()" style="flex:1;padding:11px;border-radius:var(--radius-md);border:0.5px solid var(--border-md);background:var(--bg-card);color:var(--text-primary);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer">⬇ Backup exportieren</button>
    <button onclick="importData()" style="flex:1;padding:11px;border-radius:var(--radius-md);border:0.5px solid var(--border-md);background:var(--bg-card);color:var(--text-primary);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer">⬆ Backup laden</button>
  </div>
</div>`;
  document.getElementById('content').innerHTML = html;
}

function renderNew() {
  const mods = [...new Set(topics.map(t => t.module))];
  const opts = mods.map(m => `<option>${esc(m)}</option>`).join('');
  document.getElementById('content').innerHTML = `
<div style="padding-top:4px">
  <div class="form-section">
    <label class="form-label">Thema *</label>
    <input class="form-input" id="f-name" type="text" placeholder="z.B. Aldol-Reaktion" autocomplete="off" />
  </div>
  <div class="form-section">
    <label class="form-label">Modul *</label>
    <input class="form-input" id="f-module" type="text" list="mod-opts" placeholder="z.B. OC2b" autocomplete="off" />
    <datalist id="mod-opts">${opts}</datalist>
  </div>
  <div class="form-section">
    <label class="form-label">Notizen (optional)</label>
    <textarea class="form-textarea" id="f-notes" placeholder="Stichworte, Literatur, Schwerpunkte ..."></textarea>
  </div>
  <div class="cycle-info">
    <div class="cycle-title">Wiederholungszyklus</div>
    <div class="cycle-steps">
      <span class="cycle-step">1h</span><span class="cycle-arrow">→</span>
      <span class="cycle-step">1T</span><span class="cycle-arrow">→</span>
      <span class="cycle-step">3T</span><span class="cycle-arrow">→</span>
      <span class="cycle-step">1W</span><span class="cycle-arrow">→</span>
      <span class="cycle-step">1M</span><span class="cycle-arrow">→</span>
      <span class="cycle-step">3M</span><span class="cycle-arrow">→</span>
      <span class="cycle-step" style="color:var(--purple-400)">✓</span>
    </div>
  </div>
  <button class="btn-primary" onclick="addTopic()">Thema anlegen + Zyklus starten</button>
</div>`;
}

function addTopic() {
  const name = (document.getElementById('f-name').value || '').trim();
  const module = (document.getElementById('f-module').value || '').trim();
  const notes = (document.getElementById('f-notes').value || '').trim();
  if (!name) { toast('Bitte einen Themen-Namen eingeben.'); return; }
  if (!module) { toast('Bitte ein Modul angeben.'); return; }
  const t = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
    name, module, notes,
    createdAt: Date.now(),
    intervalIndex: 0,
    nextDue: Date.now() + INTERVALS[0].ms,
    lastReviewed: null,
    status: 'active'
  };
  topics.unshift(t);
  save();
  toast('✓ Angelegt! Erste WH in 1 Stunde.');
  showTab('today');
}

// ─────────────────────────────────────────────
// Navigation
// ─────────────────────────────────────────────
const TAB_TITLES = { today: 'Heute', topics: 'Alle Themen', modules: 'Module', new: 'Neues Thema' };

function showTab(tab) {
  activeTab = tab;
  if (tab !== 'topics') filterModule = 'all';
  document.getElementById('header-title').textContent = TAB_TITLES[tab];
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['today','topics','modules','new'][i] === tab);
  });
  ['today','topics','modules','new'].forEach(t => {
    const el = document.getElementById('nav-' + t);
    if (el) el.classList.toggle('active', t === tab);
  });
  updateStats();
  render();
}

function render() {
  if (activeTab === 'today') renderToday();
  else if (activeTab === 'topics') renderTopics();
  else if (activeTab === 'modules') renderModules();
  else renderNew();
}

function updateStats() {
  document.getElementById('s-due').textContent = topics.filter(isDue).length;
  document.getElementById('s-total').textContent = topics.length;
  document.getElementById('s-mastered').textContent = topics.filter(t => t.status === 'mastered').length;
  const now = new Date();
  document.getElementById('header-date').textContent = now.toLocaleDateString('de-DE', {
    weekday: 'short', day: 'numeric', month: 'short'
  });
}

// ─────────────────────────────────────────────
// Toast
// ─────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ─────────────────────────────────────────────
// PWA Service Worker
// ─────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const sw = `
const CACHE = 'wh-v1';
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
});`;
  const blob = new Blob([sw], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(() => {});
}

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
(async () => { await load(); showTab('today'); })();

// Refresh due counts every minute
setInterval(() => {
  updateStats();
  if (activeTab === 'today') renderToday();
}, 60_000);
</script>
</body>
</html>
